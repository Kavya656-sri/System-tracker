<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Productivity Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #1e293b;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .auth-card {
      width: min(440px, calc(100vw - 32px));
      border: 0;
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, .12);
      overflow: hidden;
    }
    .auth-header {
      background: #1e293b;
      color: #f8fafc;
      padding: 26px 28px;
    }
    .auth-header p {
      color: #cbd5e1;
    }
    .form-control {
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      padding: 11px 13px;
    }
    .form-control:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, .14);
    }
    .btn-auth {
      background: #0f766e;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      padding: 11px 16px;
    }
    .btn-auth:hover {
      background: #0d665f;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card auth-card">
    <div class="auth-header">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-shield-lock-fill"></i>
        <span class="fw-bold">Productivity Tracker</span>
      </div>
      <h1 class="h3 fw-bold mb-1">Welcome back</h1>
      <p class="mb-0">Sign in to view your dashboard.</p>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} py-2">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" novalidate>
        <div class="mb-3">
          <label for="login_email" class="form-label fw-semibold">Login Email</label>
          <input type="email" id="login_email" name="login_email" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-auth w-100">Login</button>
      </form>
      <div class="text-center mt-3 small">
        New to Productivity Tracker?
        <a href="{{ url_for('register') }}" class="fw-semibold text-decoration-none">Create an account</a>
      </div>
    </div>
  </div>
</body>
</html>
