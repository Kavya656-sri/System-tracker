<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=processed-20260609o">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/activity_processor.js') }}?v=processed-20260609o"></script>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    {% include 'sidebar.html' %}
    <!-- Main Content -->
    <main class="flex-grow-1 p-4">
        {% if current_user %}
        <div class="dashboard-user-header d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
            <div>
                <div class="text-muted small fw-semibold text-uppercase" style="letter-spacing:.04em;">Dashboard</div>
                <div class="fw-bold text-dark">Welcome, {{ current_user.employee_name }}</div>
                <div class="text-muted small">Role: {{ current_user.role }}</div>
            </div>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Highlight active sidebar menu based on current URL
  document.addEventListener('DOMContentLoaded', function() {
    const currentPath = window.location.pathname;
    const sidebarLinks = document.querySelectorAll('#sidebar-wrapper .list-group-item');
    
    sidebarLinks.forEach(link => {
      // Remove active class from all links
      link.classList.remove('active');
      
      // Get the href attribute
      const href = link.getAttribute('href');
      
      // Check if current path matches the link's href
      if (currentPath === href || currentPath.startsWith(href + '/')) {
        link.classList.add('active');
      }
    });
  });
</script>
</body>
</html>
