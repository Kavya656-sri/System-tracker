{% extends 'base.html' %}
{% block title %}Productivity{% endblock %}
{% block content %}
<div class="container-fluid">
  <!-- Summary Cards -->
  <div class="row g-4 mb-4">
    <div class="col-md-3"><div class="card shadow-sm"><div class="card-body text-center"><h6 class="card-title text-muted">Productivity Score (%)</h6><p class="display-4 text-success" id="prod-score">0</p></div></div></div>
    <div class="col-md-3"><div class="card shadow-sm"><div class="card-body text-center"><h6 class="card-title text-muted">Total Work Time</h6><p class="display-4" id="total-work-time">0</p></div></div></div>
    <div class="col-md-3"><div class="card shadow-sm"><div class="card-body text-center"><h6 class="card-title text-muted">Productive Time</h6><p class="display-4 text-success" id="productive-time">0</p></div></div></div>
    <div class="col-md-3"><div class="card shadow-sm"><div class="card-body text-center"><h6 class="card-title text-muted">Idle Time</h6><p class="display-4 text-danger" id="idle-time">0</p></div></div></div>
  </div>
  <!-- Productive vs Idle Doughnut -->
  <div class="row g-4 mb-4">
    <div class="col-lg-6"><div class="card shadow-sm"><div class="card-body"><h5 class="card-title">Productive vs Idle</h5><canvas id="prodIdleChart" height="300"></canvas></div></div></div>
    <div class="col-lg-6"><div class="card shadow-sm"><div class="card-body"><h5 class="card-title">Project Productivity Breakdown</h5><canvas id="projectBarChart" height="300"></canvas></div></div></div>
  </div>
  <!-- Top Applications -->
  <div class="row g-4 mb-4">
    <div class="col-12"><div class="card shadow-sm"><div class="card-body"><h5 class="card-title">Top Productive Applications</h5><canvas id="topAppChart" height="300"></canvas></div></div></div>
  </div>
  <!-- Productivity Trend -->
  <div class="row g-4 mb-4">
    <div class="col-12"><div class="card shadow-sm"><div class="card-body"><h5 class="card-title">Productivity Trend</h5><canvas id="trendChart" height="300"></canvas></div></div></div>
  </div>
  <!-- Insights -->
  <div class="row g-4 mb-4">
    <div class="col-12"><div class="card shadow-sm"><div class="card-body"><h5 class="card-title">Insights</h5><ul id="insights-list" class="list-unstyled mb-0"></ul></div></div></div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/productivity.js') }}"></script>
{% endblock %}
